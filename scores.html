<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NBA Live Scores 2026</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <nav class="navbar">
        <div class="nav-container">
            <a href="#" class="nav-logo">NBA<span>LIVE</span></a>
            
            <div class="menu-toggle" id="mobile-menu">
                <span class="bar"></span>
                <span class="bar"></span>
                <span class="bar:"></span>
            </div>

            <ul class="nav-links">
                <li><a href="scores.html">Scores</a></li>
                <li><a href="schedule.html">Schedule</a></li>
                <li><a href="standings.html">Standings</a></li>
                <li><a href="news.html">News</a></li>
            </ul>
        </div>
    </nav>

    <header>
        <h1>Live NBA Basketball</h1>
        <p id="date-display">Wednesday, March 4, 2026</p>
    </header>

    <main class="score-container">
        <div class="game-card">
            <div class="game-status live">LIVE - 3rd Qtr 08:12</div>
            <div class="teams-container">
                <div class="team">
                    <img src="https://loodibee.com/wp-content/uploads/nba-los-angeles-lakers-logo.png" alt="Lakers">
                    <span class="team-name">Lakers</span>
                    <span class="score">74</span>
                </div>
                <div class="vs">VS</div>
                <div class="team">
                    <img src="https://loodibee.com/wp-content/uploads/nba-golden-state-warriors-logo.png" alt="Warriors">
                    <span class="team-name">Warriors</span>
                    <span class="score">82</span>
                </div>
            </div>
            <div class="game-footer">
                <button class="stats-btn">Game Details</button>
            </div>
        </div>

        <div class="game-card">
            <div class="game-status">Final</div>
            <div class="teams-container">
                <div class="team">
                    <img src="https://loodibee.com/wp-content/uploads/nba-boston-celtics-logo.png" alt="Celtics">
                    <span class="team-name">Celtics</span>
                    <span class="score">112</span>
                </div>
                <div class="vs">VS</div>
                <div class="team">
                    <img src="https://loodibee.com/wp-content/uploads/nba-miami-heat-logo.png" alt="Heat">
                    <span class="team-name">Heat</span>
                    <span class="score">104</span>
                </div>
            </div>
            <div class="game-footer">
                <button class="stats-btn">Box Score</button>
            </div>
        </div>
    </main>
    <script src="script.js"></script>
</body>
</html>
